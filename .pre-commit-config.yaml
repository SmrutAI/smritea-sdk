# Pre-commit hooks for smritea-sdk
#
# Setup:
#   pip install pre-commit && pre-commit install
#
# Usage:
#   pre-commit run --all-files   # Run all hooks
#   pre-commit run <hook-id>     # Run a specific hook

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # Runs first — ensures all language dependencies are downloaded before
      # any format/lint/test hook tries to build. Mirrors smritea-cloud's
      # go-module-sync hook which runs before all other hooks.
      - id: sdk-install
        name: Install SDK dependencies (Python + TypeScript + Go + Java + C#)
        entry: make install
        language: system
        files: pom\.xml|\.csproj|package\.json|pyproject\.toml|go\.(mod|sum)$
        pass_filenames: false

      # Keep TypeScript package-lock.json in sync with package.json.
      # When package.json is modified (e.g. version bump, new dep), npm install
      # regenerates the lock file. This hook auto-stages the updated lock file
      # so the commit always includes a consistent package-lock.json.
      - id: ts-lockfile-sync
        name: Sync TypeScript package-lock.json
        entry: bash -c 'cd typescript && npm install --silent && git add package-lock.json'
        language: system
        files: typescript/package\.json$
        pass_filenames: false

      - id: sdk-format
        name: Format (Python + TypeScript + Go + Java + C#)
        entry: make format
        language: system
        files: \.(py|ts|go|java|cs)$
        exclude: _internal/autogen/|internal/autogen/
        pass_filenames: false

      - id: sdk-lint
        name: Lint (Python + TypeScript + Go + Java + C#)
        entry: make lint
        language: system
        files: \.(py|ts|go|java|cs)$
        exclude: _internal/autogen/|internal/autogen/
        pass_filenames: false

      - id: sdk-test
        name: Test (Python + TypeScript + Go + Java + C#)
        entry: make test
        language: system
        files: \.(py|ts|go|java|cs)$
        exclude: _internal/autogen/|internal/autogen/
        pass_filenames: false